name: Extension Release

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'

jobs:
  release:
    name: Package & Release Extension
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: node --test tests/extension-filter-utils.test.mjs

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(jq -r '.version' extension/manifest.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          jq --arg v "$NEW_VERSION" '.version = $v' extension/manifest.json > tmp.json && mv tmp.json extension/manifest.json
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit & tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/manifest.json
          git commit -m "chore: bump extension to ${{ steps.version.outputs.version }} [skip ci]"
          git tag ${{ steps.version.outputs.tag }}
          git push && git push --tags

      - name: Package extension
        run: |
          zip -r "esridevs-content-tracker-${{ steps.version.outputs.tag }}.zip" extension/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Extension ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: esridevs-content-tracker-${{ steps.version.outputs.tag }}.zip
